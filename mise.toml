[tools]
go = "1.26"
age = "latest"
"go:golang.org/x/tools/cmd/stringer" = "latest"
"go:github.com/varlink/go/cmd/varlink-go-interface-generator" = "latest"
golangci-lint = "2.10.1"
gotestsum = "latest"
mockery = "latest"
sops = "latest"

[settings]
experimental = true

[env]
DOCKER_HOST="unix://{{get_env(name='XDG_RUNTIME_DIR',default='/var/run')}}/podman/podman.sock"

[vars]
CURRENTBRANCH = "{{exec(command='git rev-parse --abbrev-ref HEAD')}}"
PKGVERSION = '{{exec(command="git describe --tags --abbrev=8 --dirty --always --long")}}'
LDFLAGS = "{{ get_env(name='LDFLAGS',default='-w -s') }} -X 'main.Version={{vars.PKGVERSION}}'"
AGEKEY = "age1s2sc3dz0vrcmungswpxwnett7ayvzmfuke8vw0w3te36l742kpqs6kg606"
NOCGO = "remote exclude_graphdriver_btrfs btrfs_noversion exclude_graphdriver_devicemapper containers_image_openpgp"
releasedir = "./release"

[tasks.container]
depends = ["build", "lint", "test"]
env = { LDFLAGS = '-ldflags="-w -s"' }
run = "podman build -f Containerfile.ci --platform=linux/amd64 -t primamateria.systems/materia:latest ."

[tasks.build]
depends = ["generate", "build-arm64", "build-amd64"]

[tasks.fmt]
depends = ["generate"]
sources = ["go.mod", "go.sum", "**/*.go"]
outputs = { auto = true }
run = "golangci-lint fmt ./cmd/... ./internal/... ./pkg/..."

[tasks.lint]
depends = ["generate"]
sources = ["go.mod", "go.sum", "**/*.go"]
outputs = { auto = true }
run = "golangci-lint run ./cmd/... ./internal/... ./pkg/..."

[tasks.test]
depends = ["fmt", "lint"]
usage = '''
flag "-v --verbose" help="Verbose gotestum output" default=#false
'''
run = [
  "gotestsum {% if usage.verbose %} --format standard-verbose {% endif %} -- -tags '{{ vars.NOCGO }}' ./internal/... ./pkg/...",
]

[tasks.virter]
depends = ["build-amd64"]
tools."github:LINBIT/virter" = "latest"
usage = """
  flag "-f --fresh" help="Create a new VM if one is currently running" default=#false
"""
run = """
  #!/usr/bin/env bash
  [[ "${usage_fresh}" == "true" ]] && if virter vm exists materia-explore-alma-9; then virter vm rm materia-explore-alma-9; fi
  if ! virter vm exists materia-explore-alma-9; then virter vm run --name materia-explore-alma-9 --id 102 --wait-ssh alma-9; fi
  virter vm exec materia-explore-alma-9 --provision virter/virter_explore.toml
"""

[tasks.generate]
description = "Run go:generate"
sources = ["go.mod", "go.sum", "**/*.go", ".mockery.yml","pkg/api/systems.primamateria.materia.varlink"]
outputs = { auto = true }
run = [
  "go generate ./...",
  "varlink-go-interface-generator pkg/api/systems.primamateria.materia.varlink",
  "mockery",
]

[tasks.build-amd64]
depends = ["build-materia-amd64"]

[tasks.build-arm64]
depends = [
  "build-materia-arm64",
]

[tasks.build-materia-arm64]
depends = ["lint"]
description = "Build the project for arm64"
sources = ["go.mod", "go.sum", "**/*.go"]
outputs = ["./bin/materia-arm64"]
env = { GOOS = "linux", GOARCH = "arm64", CGO_ENABLED = 0 }
run = 'go build -tags "{{vars.NOCGO}}" -ldflags="{{vars.LDFLAGS}}" -o bin/materia-arm64 ./cmd/materia/'

[tasks.build-materia-amd64]
depends = ["lint"]
description = "Build the project for amd64"
sources = ["go.mod", "go.sum", "**/*.go"]
outputs = ["./bin/materia-amd64"]
env = { GOOS = "linux", GOARCH = "amd64", CGO_ENABLED = 0 }
run = 'go build -tags "{{vars.NOCGO}}" -ldflags="{{vars.LDFLAGS}}" -o bin/materia-amd64 ./cmd/materia/'

[tasks.docs]
description = "generate manpages"
dir = "docs"
tools.pandoc = "latest"
run = [
  "mkdir -p output/{{vars.CURRENTBRANCH}}/man",
  "find . -iname \"*.*.md\" -type f -exec sh -c 'pandoc \"${0}\" -f commonmark_x -s -t man -o output/{{vars.CURRENTBRANCH}}/man/\"$(basename ${0%.md})\"' {} \\; ",
]

[tasks.release-tar]
description = "generate release tarballs"
depends = ["lint", "test", "build", "docs"]
usage = '''
  arg "<version>" help="Version to release" default="latest"
'''
run = [
  "mkdir -p {{vars.releasedir}}/bin {{vars.releasedir}}/man/man1 {{vars.releasedir}}/man/man5",
  "cp ./README.md {{vars.releasedir}}/ ",
  "cp ./LICENSE {{vars.releasedir}}/",
  "cp docs/output/{{vars.CURRENTBRANCH}}/man/*.1 {{vars.releasedir}}/man/man1/",
  "cp docs/output/{{vars.CURRENTBRANCH}}/man/*.5 {{vars.releasedir}}/man/man5/",
  "cp bin/materia-amd64 {{vars.releasedir}}/bin/materia",
  "tar -czvf ./materia-${usage_version?}-amd64.tar.gz -C {{vars.releasedir}} .",
  "rm {{vars.releasedir}}/bin/materia",
  "cp bin/materia-arm64 {{vars.releasedir}}/bin/materia",
  "tar -czvf ./materia-${usage_version?}-arm64.tar.gz -C {{vars.releasedir}} .",
]

[tasks.github-release]
description = "Generate github release"
depends = ["lint", "test", "build"]
usage = '''
  arg "<version>" help="Version to release" 
'''
tools.gh = "latest"
run = [
  "mise task run release-tar ${usage_version?}",
  "gh release create ${usage_version?} --generate-notes ./materia-${usage_version?}-amd64.tar.gz ./materia-${usage_version?}-arm64.tar.gz ./bin/materia*",
]

[tasks.vulncheck]
tools = { "go:golang.org/x/vuln/cmd/govulncheck" = "latest" }
run = "govulncheck ./..."

[tasks.integration]
depends = [ "build" ]
usage = '''
  arg "[test]" help="Test to run" 
  flag "-k --keep" help="Keep container after running" default=#false
'''
raw = true
run = '''
  export TESTCONTAINERS_RYUK_DISABLED={{usage.keep}}
  export MATERIA_KEEP_TEST_CONTAINER={{usage.keep}}
  gotestsum --format standard-verbose -- \
  {%- if usage.test != "" -%} -run {{usage.test}} \ {%- endif -%}
  -v \
  -failfast \
  -count=1 \
  ./scripts/integration-tests/...
'''
