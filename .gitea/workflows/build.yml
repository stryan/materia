---
name: build
on:
  push:
    branches: [master]
    tags-ignore: ['**']
    paths:
      - internal/**
      - cmd/**
      - scripts/**
      - pkg/**
      - .gitea/workflows/build.yml
      - mise.toml
      - go.mod
      - go.sum
  pull_request:
    branches: [master]
env:
  REGISTRY_USER: ${{ github.actor }}
  REGISTRY_PASSWORD: ${{ secrets.REGISTRY_TOKEN }}
  IMAGE_REGISTRY: ${{ vars.FORGE }}/${{ github.actor }}
  MISE_ENV: ci
  GH_TOKEN: ${{ secrets.GH_TOKEN }}
  RYUK_CONTAINER_PRIVILEGED: true
jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: jdx/mise-action@v4
        with:
          install: true  
          cache: false  
          experimental: true  
          github_token: ${{ secrets.GH_TOKEN }}
      - name: Setup qemu
        run: docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.FORGE }}
          username: ${{ gitea.actor }}
          password: ${{ secrets.REGISTRY_TOKEN }}
      - name: Login to ghcr registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}
      - name: Build container
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            mise ci
          else
            mise ci latest
          fi
      - name: Cleanup leftover containers
        if: always()
        run: docker ps -aq --filter "label=org.testcontainers=true" | xargs -r docker rm -f
      - name: Logout registry
        run: docker logout $(IMAGE_REGISTRY)
      - name: Logout registry
        run: docker logout ghcr.io
